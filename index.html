<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora para Contagem - Controle de Distribuição</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-item { transition: all 0.2s ease; }
        
        /* Cores customizadas */
        .bg-custom-blue { background-color: #0f5896; }
        .text-custom-blue { color: #0f5896; }
        .border-custom-blue { border-color: #0f5896; }
        .focus-ring-custom:focus { --tw-ring-color: #0f5896; }

        /* Remove as setinhas (spinners) padrão do navegador */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        .custom-shadow { box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.07); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans pb-24 text-slate-800">

    <!-- Header com Azul Customizado (#0f5896) -->
    <header class="bg-custom-blue sticky top-0 z-50 shadow-md">
        <div class="max-w-2xl mx-auto p-4 flex items-center justify-between">
            <div>
                <h1 class="text-xl font-black text-white leading-none tracking-tight">Gerenciador de distribuição</h1>
                <p class="text-[10px] uppercase tracking-widest text-blue-100 font-bold mt-1 text-opacity-80">Calculadora para Contagem de Cubas</p>
            </div>
            <div id="clock-display" class="bg-black/20 px-3 py-1.5 rounded-lg font-mono font-bold text-sm text-white border border-white/20 backdrop-blur-sm">
                00:00
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-6">
        
        <!-- Janela de Tempo -->
        <section class="bg-white rounded-3xl p-6 custom-shadow border border-slate-100">
            <div class="flex items-center gap-2 mb-5">
                <span class="text-xl">⏱️</span>
                <h2 class="text-sm font-bold text-slate-700 uppercase tracking-wide">Janela de Tempo</h2>
            </div>
            
            <div class="grid grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="block text-[11px] font-bold text-slate-500 uppercase">Duração Total</label>
                    <div class="flex items-center gap-2">
                        <div class="relative flex-1">
                            <input type="number" id="totalH" value="3" min="0" oninput="updateAll()" 
                                   class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus-ring-custom outline-none text-center font-bold">
                            <span class="absolute right-2 bottom-1 text-[12px] text-slate-400">h</span>
                        </div>
                        <div class="relative flex-1">
                            <input type="number" id="totalM" value="0" min="0" max="59" oninput="updateAll()"
                                   class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus-ring-custom outline-none text-center font-bold">
                            <span class="absolute right-2 bottom-1 text-[12px] text-slate-400">m</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-[11px] font-bold text-custom-blue uppercase">Tempo Decorrido</label>
                    <div class="flex items-center gap-2">
                        <div class="relative flex-1">
                            <input type="number" id="elapsedH" value="0" min="0" oninput="updateAll()"
                                   class="w-full p-3 bg-blue-50/50 border border-slate-200 rounded-xl focus:ring-2 focus-ring-custom outline-none text-center font-bold text-custom-blue">
                            <span class="absolute right-2 bottom-1 text-[12px] text-blue-400">h</span>
                        </div>
                        <div class="relative flex-1">
                            <input type="number" id="elapsedM" value="0" min="0" max="59" oninput="updateAll()"
                                   class="w-full p-3 bg-blue-50/50 border border-slate-200 rounded-xl focus:ring-2 focus-ring-custom outline-none text-center font-bold text-custom-blue">
                            <span class="absolute right-2 bottom-1 text-[12px] text-blue-400">m</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-6 pt-4 border-t border-slate-50">
                <div class="flex justify-between text-[11px] font-bold text-slate-400 mb-2">
                    <span id="time-summary">A calcular...</span>
                    <span id="percent-label">0%</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden p-0.5 border border-slate-200">
                    <div id="timeProgressBar" class="bg-custom-blue h-full rounded-full transition-all duration-700 w-0"></div>
                </div>
            </div>
        </section>

        <!-- Container de Alimentos -->
        <div id="itemsList" class="space-y-4"></div>

        <!-- Botões de Ação -->
        <div class="grid grid-cols-1 gap-3">
            <button onclick="addNewItem()" 
                    class="w-full py-5 bg-custom-blue shadow-lg shadow-blue-900/10 rounded-3xl text-white font-bold hover:brightness-110 transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                <span class="text-xl">＋</span> Adicionar Alimento
            </button>
            
            <button onclick="if(confirm('Limpar todas as preparações?')) { document.getElementById('itemsList').innerHTML = ''; updateAll(); }" 
                    class="w-full py-3 text-slate-400 text-xs font-bold hover:text-red-500 transition-colors">
                Limpar Lista Completa
            </button>
        </div>

    </main>

    <!-- Template -->
    <template id="itemTemplate">
        <div class="card-item bg-white rounded-3xl custom-shadow border border-slate-100 overflow-hidden p-5">
            <div class="space-y-4">
                <div class="flex items-center justify-between gap-4">
                    <div class="flex items-center gap-3 flex-1">
                        <div class="w-10 h-10 bg-slate-50 rounded-2xl flex items-center justify-center text-lg shadow-inner">🍲</div>
                        <input type="text" placeholder="Nome do Alimento" 
                               class="item-name font-bold text-slate-800 border-b border-transparent focus:border-blue-300 bg-transparent py-1 w-full outline-none text-lg">
                    </div>
                    <button onclick="this.closest('.card-item').remove(); updateAll()" class="p-2 text-slate-300 hover:text-red-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-50 p-3 rounded-2xl text-center border border-transparent">
                        <label class="block text-[10px] uppercase font-black text-slate-400 mb-1 tracking-tighter">Cubas Iniciais</label>
                        <input type="number" value="20" min="0" step="0.1" oninput="updateAll()"
                               class="item-initial w-full bg-transparent text-center font-black text-xl outline-none text-slate-700">
                    </div>
                    <div class="bg-slate-50 p-3 rounded-2xl text-center border border-slate-200/50 flex flex-col items-center">
                        <label class="block text-[10px] uppercase font-black text-slate-500 mb-1 tracking-tighter w-full">Cubas Atuais</label>
                        <div class="flex items-center justify-center w-full gap-1">
                            <button onclick="decrementItem(this)" 
                                    class="w-10 h-10 bg-white text-slate-400 border border-slate-200 rounded-full flex items-center justify-center shadow-sm active:scale-90 transition-transform font-bold text-xl">
                                −
                            </button>
                            
                            <input type="number" value="15" min="0" step="0.1" oninput="updateAll()"
                                   class="item-current w-14 bg-transparent text-center font-black text-xl text-slate-700 outline-none">
                            
                            <button onclick="incrementItem(this)" 
                                    class="bg-custom-blue text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-transform font-bold text-xl">
                                +
                            </button>
                        </div>
                    </div>
                </div>

                <div class="result-box p-4 rounded-2xl text-center font-bold text-sm transition-colors duration-300 border">
                    Calculando...
                </div>
            </div>
        </div>
    </template>

    <script>

        // 🔥 SALVAR ESTADO
        function saveState() {
            const data = {
                totalH: document.getElementById('totalH').value,
                totalM: document.getElementById('totalM').value,
                elapsedH: document.getElementById('elapsedH').value,
                elapsedM: document.getElementById('elapsedM').value,
                items: []
            };

            document.querySelectorAll('.card-item').forEach(card => {
                data.items.push({
                    name: card.querySelector('.item-name').value,
                    initial: card.querySelector('.item-initial').value,
                    current: card.querySelector('.item-current').value
                });
            });

            localStorage.setItem('appState', JSON.stringify(data));
        }

        // 🔥 CARREGAR ESTADO
        function loadState() {
            const saved = localStorage.getItem('appState');
            if (!saved) return;

            const data = JSON.parse(saved);

            document.getElementById('totalH').value = data.totalH;
            document.getElementById('totalM').value = data.totalM;
            document.getElementById('elapsedH').value = data.elapsedH;
            document.getElementById('elapsedM').value = data.elapsedM;

            const list = document.getElementById('itemsList');
            list.innerHTML = "";

            data.items.forEach(item => {
                addNewItem(item.name, item.initial, item.current);
            });

            updateAll();
        }

        function addNewItem(name = "", initial = 0, current = 0) {
            const list = document.getElementById('itemsList');
            const template = document.getElementById('itemTemplate');
            const clone = template.content.cloneNode(true);
            
            const nameInp = clone.querySelector('.item-name');
            const initInp = clone.querySelector('.item-initial');
            const currInp = clone.querySelector('.item-current');
            
            nameInp.value = name || "";
            initInp.value = initial || 0;
            currInp.value = current || 0;
            
            list.appendChild(clone);
            updateAll();
        }

        function incrementItem(btn) {
            const input = btn.previousElementSibling;
            input.value = (parseFloat(input.value || 0) + 1).toFixed(1);
            updateAll();
        }

        function decrementItem(btn) {
            const input = btn.nextElementSibling;
            const currentVal = parseFloat(input.value || 0);
            if (currentVal > 0) {
                input.value = (currentVal - 1).toFixed(1);
                updateAll();
            }
        }

        function updateAll() {
            const totH = parseInt(document.getElementById('totalH').value) || 0;
            const totM = parseInt(document.getElementById('totalM').value) || 0;
            const elpH = parseInt(document.getElementById('elapsedH').value) || 0;
            const elpM = parseInt(document.getElementById('elapsedM').value) || 0;

            const totalMin = (totH * 60) + totM;
            const elapsedMin = (elpH * 60) + elpM;
            const remainingMin = totalMin - elapsedMin;

            const percent = totalMin > 0 ? Math.min((elapsedMin / totalMin) * 100, 100) : 0;
            const bar = document.getElementById('timeProgressBar');
            if(bar) bar.style.width = percent + "%";
            
            const pLabel = document.getElementById('percent-label');
            if(pLabel) pLabel.innerText = Math.round(percent) + "%";
            
            const remH = Math.floor(Math.max(0, remainingMin) / 60);
            const remM = Math.max(0, remainingMin) % 60;
            const tSum = document.getElementById('time-summary');
            if(tSum) tSum.innerText = `Faltam: ${remH}h ${remM}m`;

            const cards = document.querySelectorAll('.card-item');
            cards.forEach(card => {
                const initial = parseFloat(card.querySelector('.item-initial').value) || 0;
                const current = parseFloat(card.querySelector('.item-current').value) || 0;
                const resBox = card.querySelector('.result-box');

                // 🚫 Se não houver cubas iniciais
                if (initial <= 0) {
                    resBox.innerText = "Informe cubas iniciais para calcular";
                    resBox.className = "result-box p-4 rounded-2xl text-center font-bold text-sm bg-slate-50 text-slate-400 border-slate-100";
                    return;
                }
                
                // 🚫 Se ainda não houve consumo
                const consumidoTemp = initial - current;
                if (consumidoTemp <= 0) {
                    resBox.innerText = "Sem consumo ainda para prever";
                    resBox.className = "result-box p-4 rounded-2xl text-center font-bold text-sm bg-slate-50 text-slate-400 border-slate-100";
                    return;
                }

                if (elapsedMin <= 0) {
                    resBox.innerText = "Aguarde a distribuição iniciar";
                    resBox.className = "result-box p-4 rounded-2xl text-center font-bold text-sm bg-slate-50 text-slate-400 border-slate-100";
                    return;
                }

                const consumido = initial - current;
                const taxaPorMinuto = consumido / elapsedMin;
                const previsaoNecessaria = taxaPorMinuto * remainingMin;
                const saldoFinal = current - previsaoNecessaria;

                const saldoAbs = Math.abs(saldoFinal).toFixed(1);

                if (saldoFinal < -0.1) {
                    resBox.innerText = `🚨 ALERTA: Vão faltar ~${saldoAbs} cubas!`;
                    resBox.className = "result-box p-4 rounded-2xl text-center font-bold text-sm bg-red-50 text-red-600 border-red-100";
                } else if (saldoFinal <= 0.5) {
                    resBox.innerText = `⚠️ ATENÇÃO: Quantidade exata. Sobra de (${saldoAbs})!`;
                    resBox.className = "result-box p-4 rounded-2xl text-center font-bold text-sm bg-amber-50 text-amber-600 border-amber-100";
                } else {
                    resBox.innerText = `✅ SEGURO: Previsão de sobra de ~${saldoAbs} cubas.`;
                    resBox.className = "result-box p-4 rounded-2xl text-center font-bold text-sm bg-emerald-50 text-emerald-600 border-emerald-100";
                }
            });

            // 🔥 salva automaticamente SEM alterar lógica visual
            saveState();
        }

        function startTime() {
            const now = new Date();
            const clock = document.getElementById('clock-display');
            if(clock) {
                clock.innerText =
                    String(now.getHours()).padStart(2, '0') + ":" +
                    String(now.getMinutes()).padStart(2, '0');
            }
            setTimeout(startTime, 1000);
        }

        // 🚀 INICIALIZAÇÃO CORRETA
        window.onload = function() {
            loadState();   // carrega primeiro
            startTime();   // inicia relógio
        };

    </script>
</body>
</html>
